<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitForge | Reset Password</title>
<link rel="stylesheet" href="global.css">


    <style>
        body {
            margin:0;
            font-family:'Segoe UI', sans-serif;
            background:#f5f7fa;
        }

        header {
            background:#fff;
            padding:15px 40px;
            display:flex;
            justify-content:space-between;
            border-bottom:1px solid #ddd;
        }

        nav a {
            margin:0 15px;
            color:#444;
            text-decoration:none;
            font-weight:500;
        }
        nav a:hover { color:#ff5722; }

        .logo { color:#ff5722; font-size:1.6rem; font-weight:bold; }

        .forgot-box {
            width:350px;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 3px 10px rgba(0,0,0,0.1);
            margin:80px auto;
            text-align:center;
        }

        input {
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:1rem;
        }

        button {
            width:100%;
            padding:12px;
            background:#ff5722;
            border:none;
            color:white;
            font-size:1rem;
            font-weight:600;
            border-radius:8px;
            cursor:pointer;
            margin-top:10px;
        }

        button:hover { background:#e64a19; }
    </style>
</head>

<body>

<header>
    <div class="logo">FitForge</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
    </nav>
</header>

<div class="forgot-box">
    <h2>Reset Password</h2>

    <input type="email" placeholder="Enter your email">

    <button onclick="location.href='success.html'">Send Reset Link</button>
</div>

</body>
</html>
