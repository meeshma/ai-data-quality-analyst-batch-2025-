<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitForge | Back Exercises</title>
<link rel="stylesheet" href="global.css">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f5f7fa;
        }
        header {
            background: #fff;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
        }
        .logo {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ff5722;
        }
        nav a {
            margin-left: 15px;
            color: #444;
            text-decoration: none;
            font-weight: 500;
        }
        nav a:hover {
            color: #ff5722;
        }
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        h1 {
            color: #ff5722;
            margin-bottom: 30px;
        }
        .tutorial-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }
        @media(max-width:900px) {
            .tutorial-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media(max-width:600px) {
            .tutorial-grid { grid-template-columns: 1fr; }
        }
        .tutorial-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
            transition: 0.15s;
            text-align: center;
        }
        .tutorial-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 14px rgba(0,0,0,0.12);
        }
        .tutorial-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        .tutorial-card img:hover { opacity: 0.85; }
        .tutorial-card h3 {
            margin: 15px 0 10px;
            font-size: 1.2rem;
        }
        .tutorial-card button {
            margin-top: 10px;
            padding: 10px 18px;
            background: #ff5722;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
        }
        .tutorial-card button:hover { background: #e64a19; }
    </style>
</head>
<body>

<header>
    <div class="logo">FitForge</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="tutorials.html">Tutorials</a>
    </nav>
</header>

<div class="container">
    <h1>Back Exercises</h1>
    <div class="tutorial-grid">

        <!-- Pull-Ups -->
        <div class="tutorial-card">
            <img src="https://media.istockphoto.com/id/1185207756/photo/rear-view-of-athletic-woman-exercising-chin-ups-in-a-gym.jpg?s=612x612&w=0&k=20&c=QORFteexO_huxaitehV_Wp282Eb09UJUMKeWZiwbEgE=" alt="Pull-Ups">
            <h3>Pull-Ups</h3>
            <button onclick="location.href='pullups.html'">View Tutorial</button>
        </div>

        <!-- Bent-Over Barbell Rows -->
        <div class="tutorial-card">
            <img src="https://media.istockphoto.com/id/1429386264/photo/bent-over-barbell-row.jpg?s=612x612&w=0&k=20&c=Sq9SJ467ocSDLAl-2Zt5DqVyWmr6BR7HZuqTcnYfN3c=" alt="Bent-Over Barbell Rows">
            <h3>Bent-Over Barbell Rows</h3>
            <button onclick="location.href='bentoverbarbbellrow.html'">View Tutorial</button>
        </div>

        <!-- Lat Pulldown -->
        <div class="tutorial-card">
            <img src="https://media.istockphoto.com/id/1311512621/photo/work-out-on-pulldown-weight-machine.jpg?s=612x612&w=0&k=20&c=P3XgzD0Jjvzsrzi3anpA75Nxn1V0Hzg_51XoS2xgucs=" alt="Lat Pulldowns">
            <h3>Lat Pulldown</h3>
            <button onclick="location.href='latpulldown.html'">View Tutorial</button>
        </div>

        <!-- Seated Cable Rows -->
        <div class="tutorial-card">
            <img src="https://www.shutterstock.com/image-photo/attractive-sportswoman-exercising-on-seated-600nw-2423623079.jpg" alt="Seated Cable Rows">
            <h3>Seated Cable Rows</h3>
            <button onclick="location.href='seatedcablerow.html'">View Tutorial</button>
        </div>

        <!-- Single-Arm Dumbbell Row -->
        <div class="tutorial-card">
            <img src="https://sportivetricksstorage.blob.core.windows.net/images/articles/powerlifting/technique/one-arm-row/1-man-db-row.webp" alt="Single-Arm Dumbbell Row">
            <h3>Single-Arm Dumbbell Row</h3>
            <button onclick="location.href='singlearmdumbbellrow.html'">View Tutorial</button>
        </div>

    </div>
</div>

</body>
</html>
