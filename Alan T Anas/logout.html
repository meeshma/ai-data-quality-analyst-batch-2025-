<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitForge | Logout</title>
    <link rel="stylesheet" href="global.css">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f5f7fa;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: #fff;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ff5722;
        }

        nav a {
            margin: 0 15px;
            color: #444;
            text-decoration: none;
            font-weight: 500;
        }

        nav a:hover {
            color: #ff5722;
        }

        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
        }

        .container h2 {
            font-size: 2rem;
            color: #333;
            margin-bottom: 20px;
        }

        .container p {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 30px;
        }

        .btn-logout {
            padding: 12px 25px;
            background: #ff5722;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.2s;
        }

        .btn-logout:hover {
            background: #e64a19;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">FitForge</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
        </nav>
    </header>

    <div class="container">
        <div>
            <h2>You have been logged out</h2>
            <p>Thank you for using FitForge! Click below to login again.</p>
            <a class="btn-logout" href="login.html">Login Again</a>
        </div>
    </div>

    <script>
        // If you had stored a session or login in localStorage, clear it here
        // Example: localStorage.removeItem("loggedIn");
    </script>

</body>

</html>
