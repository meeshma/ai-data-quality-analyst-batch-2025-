<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Daily Workout | FitForge</title>
<link rel="stylesheet" href="global.css">

<style>
body { margin:0; font-family:'Segoe UI'; background:#f5f7fa; }
header { background:#fff; padding:15px 40px; border-bottom:1px solid #e7e7e7; display:flex; justify-content:space-between; }
.logo { color:#ff5722; font-weight:bold; font-size:1.5rem; }
.page-hero { padding:50px 40px; color:white; background:linear-gradient(to right,#ff5722,#ff784e); }
.section { padding:50px 40px; }
.card { background:white; padding:25px; margin-bottom:25px; border-radius:12px; box-shadow:0 3px 10px rgba(0,0,0,0.08); }
nav a {
    margin: 0 15px;
    text-decoration: none;
    color: #333;
    font-weight: 500;
    transition: color 0.3s ease;
}

nav a:hover {
    color: #ff5722;
}

</style>
</head>

<body>

<header>
    <div class="logo">FitForge</div>
    <nav>
        <a href="yourfitnessdashboard.html">Dashboard</a>
    </nav>
</header>

<section class="page-hero">
    <h1>Today's Workout</h1>
    <p>Your personalized session for today.</p>
</section>

<section class="section">

<div class="card">
    <h3>Warm Up</h3>
    <ul>
        <li>Jumping Jacks — 1 min</li>
        <li>Dynamic Stretch — 2 min</li>
    </ul>
</div>

<div class="card">
    <h3>Main Workout</h3>
    <ul>
        <li>Push-Ups — 3×12</li>
        <li>Bodyweight Squats — 3×15</li>
        <li>Plank — 3×45 sec</li>
    </ul>
</div>

<div class="card">
    <h3>Cool Down</h3>
    <ul>
        <li>Hamstring Stretch — 1 min</li>
        <li>Shoulder Stretch — 1 min</li>
    </ul>
</div>

</section>
</body>
</html>
