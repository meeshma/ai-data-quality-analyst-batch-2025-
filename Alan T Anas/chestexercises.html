<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitForge | Chest Exercises</title>
<link rel="stylesheet" href="global.css">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f5f7fa;
        }
        header {
            background: #fff;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
        }
        .logo {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ff5722;
        }
        nav a {
            margin-left: 15px;
            color: #444;
            text-decoration: none;
            font-weight: 500;
        }
        nav a:hover {
            color: #ff5722;
        }
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        h1 {
            color: #ff5722;
            margin-bottom: 30px;
        }
        .tutorial-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }
        @media(max-width:900px) {
            .tutorial-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media(max-width:600px) {
            .tutorial-grid { grid-template-columns: 1fr; }
        }
        .tutorial-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
            transition: 0.15s;
            text-align: center;
        }
        .tutorial-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 14px rgba(0,0,0,0.12);
        }
        .tutorial-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        .tutorial-card img:hover { opacity: 0.85; }
        .tutorial-card h3 {
            margin: 15px 0 10px;
            font-size: 1.2rem;
        }
        .tutorial-card button {
            margin-top: 10px;
            padding: 10px 18px;
            background: #ff5722;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
        }
        .tutorial-card button:hover { background: #e64a19; }
    </style>
</head>
<body>

<header>
    <div class="logo">FitForge</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="tutorials.html">Tutorials</a>
    </nav>
</header>

<div class="container">
    <h1>Chest Exercises</h1>
    <div class="tutorial-grid">

        <!-- Barbell Bench Press -->
        <div class="tutorial-card">
            <img src="https://images.ctfassets.net/8urtyqugdt2l/2bMyO0jZaRJjfRptw60iwG/17c391156dd01ae6920c672cc2744fb1/desktop-bench-press.jpg" alt="Barbell Bench Press">
            <h3>Barbell Bench Press</h3>
            <button onclick="location.href='barbellbenchpress.html'">View Tutorial</button>
        </div>

        <!-- Incline Dumbbell Press -->
        <div class="tutorial-card">
            <img src="https://vitalnutrition.nl/cdn/shop/articles/incline-dumbbell-press_40c87738-25c8-4b2b-b156-33ca3976cf9f.png?v=1756132128&width=1500" alt="Incline Dumbbell Press">
            <h3>Incline Dumbbell Press</h3>
            <button onclick="location.href='inclinedumbbellpress.html'">View Tutorial</button>
        </div>

        <!-- Chest Fly -->
        <div class="tutorial-card">
            <img src="https://media.istockphoto.com/id/1367618972/photo/a-muscular-and-fit-asian-man-does-some-flys-on-the-chest-fly-machine-also-known-as-a-pec-deck.jpg?s=612x612&w=0&k=20&c=Jc2sA_y-PsNZf3BpiuOwVeqkju9G4DdMqGCU36lV9UY=" alt="Chest Fly">
            <h3>Chest Fly</h3>
            <button onclick="location.href='chestfly.html'">View Tutorial</button>
        </div>

        <!-- Push-Ups -->
        <div class="tutorial-card">
            <img src="https://media.istockphoto.com/id/1254996126/photo/beautiful-young-sports-lady-doing-push-ups-while-workout-at-home.jpg?s=612x612&w=0&k=20&c=RrfOu6AOL-RiHUoew1mb0BRcvenLAAn13Q4YDglUWdM=" alt="Push-Ups">
            <h3>Push-Ups</h3>
            <button onclick="location.href='pushups.html'">View Tutorial</button>
        </div>

        <!-- Chest Dips -->
        <div class="tutorial-card">
            <img src="https://www.mensfitness.com/.image/w_1080,q_auto:good,c_limit/MjE0MDYyMzYyNjkxMzgxMDg1/man-during-workout-in-the-gym.jpg?arena_f_autos" alt="Chest Dips">
            <h3>Chest Dips</h3>
            <button onclick="location.href='chestdips.html'">View Tutorial</button>
        </div>

    </div>
</div>

</body>
</html>
