<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitForge | Shoulder Exercises</title>
<link rel="stylesheet" href="global.css">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f5f7fa;
        }
        header {
            background: #fff;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
        }
        .logo {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ff5722;
        }
        nav a {
            margin-left: 15px;
            color: #444;
            text-decoration: none;
            font-weight: 500;
        }
        nav a:hover {
            color: #ff5722;
        }
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        h1 {
            color: #ff5722;
            margin-bottom: 30px;
        }
        .tutorial-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }
        @media(max-width:900px) {
            .tutorial-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media(max-width:600px) {
            .tutorial-grid { grid-template-columns: 1fr; }
        }
        .tutorial-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
            transition: 0.15s;
            text-align: center;
        }
        .tutorial-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 14px rgba(0,0,0,0.12);
        }
        .tutorial-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        .tutorial-card img:hover { opacity: 0.85; }
        .tutorial-card h3 {
            margin: 15px 0 10px;
            font-size: 1.2rem;
        }
        .tutorial-card button {
            margin-top: 10px;
            padding: 10px 18px;
            background: #ff5722;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
        }
        .tutorial-card button:hover { background: #e64a19; }
    </style>
</head>
<body>

<header>
    <div class="logo">FitForge</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="tutorials.html">Tutorials</a>
    </nav>
</header>

<div class="container">
    <h1>Shoulder Exercises</h1>
    <div class="tutorial-grid">

        <!-- Overhead Press -->
        <div class="tutorial-card">
            <img src="https://images.squarespace-cdn.com/content/v1/5750d5129f72662d66448028/1516601347742-NU3F90DT62A0KBWTRQAH/Shoulder+Press.jpg?format=1500w" alt="Overhead Press">
            <h3>Overhead Press</h3>
            <button onclick="location.href='overheadpress.html'">View Tutorial</button>
        </div>

        <!-- Lateral Raises -->
        <div class="tutorial-card">
            <img src="https://i0.wp.com/www.strengthlog.com/wp-content/uploads/2024/12/dumbbell-lateral-raise-vs.-cable-lateral-raise-1-scaled.jpg?fit=2560%2C1707&ssl=1" alt="Lateral Raises">
            <h3>Lateral Raises</h3>
            <button onclick="location.href='lateralraise.html'">View Tutorial</button>
        </div>

        <!-- Front Raises -->
        <div class="tutorial-card">
            <img src="https://i0.wp.com/www.muscleandfitness.com/wp-content/uploads/2025/03/Muscular-Latino-man-using-a-dumbbell-front-raise-exercise-to-workout-his-shoulders.jpg?quality=86&strip=all" alt="Front Raises">
            <h3>Front Raises</h3>
            <button onclick="location.href='frontraise.html'">View Tutorial</button>
        </div>

        <!-- Arnold Press -->
        <div class="tutorial-card">
            <img src="https://cdn.muscleandstrength.com/sites/default/files/seated-arnold-press-thumb.jpg" alt="Arnold Press">
            <h3>Arnold Press</h3>
            <button onclick="location.href='arnoldpress.html'">View Tutorial</button>
        </div>

        <!-- Reverse pec Fly -->
        <div class="tutorial-card">
            <img src="https://i.ytimg.com/vi/5YK4bgzXDp0/maxresdefault.jpg" alt="Reverse Fly">
            <h3>Reverse pec Fly</h3>
            <button onclick="location.href='reversepecfly.html'">View Tutorial</button>
        </div>

    </div>
</div>

</body>
</html>
