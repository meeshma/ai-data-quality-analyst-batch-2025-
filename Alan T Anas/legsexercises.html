<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitForge | Leg Exercises</title>
<link rel="stylesheet" href="global.css">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f5f7fa;
        }
        header {
            background: #fff;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
        }
        .logo {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ff5722;
        }
        nav a {
            margin-left: 15px;
            color: #444;
            text-decoration: none;
            font-weight: 500;
        }
        nav a:hover {
            color: #ff5722;
        }
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        h1 {
            color: #ff5722;
            margin-bottom: 30px;
        }
        .tutorial-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }
        @media(max-width:900px) {
            .tutorial-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media(max-width:600px) {
            .tutorial-grid { grid-template-columns: 1fr; }
        }
        .tutorial-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
            transition: 0.15s;
            text-align: center;
        }
        .tutorial-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 14px rgba(0,0,0,0.12);
        }
        .tutorial-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        .tutorial-card img:hover { opacity: 0.85; }
        .tutorial-card h3 {
            margin: 15px 0 10px;
            font-size: 1.2rem;
        }
        .tutorial-card button {
            margin-top: 10px;
            padding: 10px 18px;
            background: #ff5722;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
        }
        .tutorial-card button:hover { background: #e64a19; }
    </style>
</head>
<body>

<header>
    <div class="logo">FitForge</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="tutorials.html">Tutorials</a>
    </nav>
</header>

<div class="container">
    <h1>Leg Exercises</h1>
    <div class="tutorial-grid">

        <!-- Barbell Squats -->
        <div class="tutorial-card">
            <img src="https://hips.hearstapps.com/hmg-prod/images/man-training-with-weights-royalty-free-image-1718637105.jpg" alt="Barbell Squats">
            <h3>Barbell Squats</h3>
            <button onclick="location.href='barbellsquats.html'">View Tutorial</button>
        </div>

        <!-- Lunges -->
        <div class="tutorial-card">
            <img src="https://s.yimg.com/ny/api/res/1.2/.gkE9y75wZP.1umXk2XkBA--/YXBwaWQ9aGlnaGxhbmRlcjt3PTEyNDI7aD02MjU7Y2Y9d2VicA--/https://media.zenfs.com/en/men_s_health_uk_articles_804/644c971e4d0ce766a9edff9e2107fb07" alt="Lunges">
            <h3>Lunges</h3>
            <button onclick="location.href='lunges.html'">View Tutorial</button>
        </div>

        <!-- Leg Press -->
        <div class="tutorial-card">
            <img src="https://gymgear.com/cdn/shop/articles/AdobeStock_208648017-scaled_f56160eb-ae71-40f9-b4bc-c27835e466ba-5551043.jpg?v=1763740831" alt="Leg Press">
            <h3>Leg Press</h3>
            <button onclick="location.href='legpress.html'">View Tutorial</button>
        </div>

        <!-- Romanian Deadlifts -->
        <div class="tutorial-card">
            <img src="https://gunsmithfitness.com/cdn/shop/articles/does-the-romanian-deadlift-work-the-lower-back-456638.jpg?v=1703061551&width=2048" alt="Romanian Deadlifts">
            <h3>Romanian Deadlifts</h3>
            <button onclick="location.href='romaniandeadlift.html'">View Tutorial</button>
        </div>

        <!-- Calf Raises -->
        <div class="tutorial-card">
            <img src="https://cdn.muscleandstrength.com/sites/default/files/seated-calf-raise-1.jpg" alt="Calf Raises">
            <h3>Calf Raises</h3>
            <button onclick="location.href='calfraises.html'">View Tutorial</button>
        </div>

    </div>
</div>

</body>
</html>
