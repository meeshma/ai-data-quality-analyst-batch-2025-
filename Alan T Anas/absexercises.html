<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitForge | Abs Exercises</title>
<link rel="stylesheet" href="global.css">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f5f7fa;
        }
        header {
            background: #fff;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
        }
        .logo {
            font-size: 1.6rem;
            font-weight: bold;
            color: #ff5722;
        }
        nav a {
            margin-left: 15px;
            color: #444;
            text-decoration: none;
            font-weight: 500;
        }
        nav a:hover {
            color: #ff5722;
        }
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        h1 {
            color: #ff5722;
            margin-bottom: 30px;
        }
        .tutorial-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }
        @media(max-width:900px) {
            .tutorial-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media(max-width:600px) {
            .tutorial-grid { grid-template-columns: 1fr; }
        }
        .tutorial-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
            transition: 0.15s;
            text-align: center;
        }
        .tutorial-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 14px rgba(0,0,0,0.12);
        }
        .tutorial-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        .tutorial-card img:hover { opacity: 0.85; }
        .tutorial-card h3 {
            margin: 15px 0 10px;
            font-size: 1.2rem;
        }
        .tutorial-card button {
            margin-top: 10px;
            padding: 10px 18px;
            background: #ff5722;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
        }
        .tutorial-card button:hover { background: #e64a19; }
    </style>
</head>
<body>

<header>
    <div class="logo">FitForge</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="tutorials.html">Tutorials</a>
    </nav>
</header>

<div class="container">
    <h1>Abs Exercises</h1>
    <div class="tutorial-grid">

        <!-- Crunches -->
        <div class="tutorial-card">
            <img src="https://i0.wp.com/www.muscleandfitness.com/wp-content/uploads/2018/10/abs-decline-crunch-1109.jpg?quality=86&strip=all" alt="Crunches">
            <h3>Crunches</h3>
            <button onclick="location.href='crunches.html'">View Tutorial</button>
        </div>

        <!-- Hanging Leg Raises -->
        <div class="tutorial-card">
            <img src="https://cdn.mos.cms.futurecdn.net/5Yo7oSABWE77FzwPDKiGJB.jpg" alt="Leg Raises">
            <h3>Hanging Leg Raises</h3>
            <button onclick="location.href='hanginglegraises.html'">View Tutorial</button>
        </div>

        <!-- Plank -->
        <div class="tutorial-card">
            <img src="https://hips.hearstapps.com/hmg-prod/images/hdm119918mh15842-1545237096.png?crop=0.668xw:1.00xh;0.117xw,0&resize=1200:*" alt="Plank">
            <h3>Plank</h3>
            <button onclick="location.href='plank.html'">View Tutorial</button>
        </div>

        <!-- Bicycle Crunches -->
        <div class="tutorial-card">
            <img src="https://cdn.mos.cms.futurecdn.net/Dk9YZ2hq8ydGKX3mV3JwQJ.jpg" alt="Bicycle Crunches">
            <h3>Bicycle Crunches</h3>
            <button onclick="location.href='bicyclecrunches.html'">View Tutorial</button>
        </div>

        <!-- Russian Twists -->
        <div class="tutorial-card">
            <img src="https://forbesandburton.com.au/wp-content/uploads/2023/12/man-doing-fitness-workout-practicing-abs-exercise-2023-11-27-04-53-55-utc-1.jpg" alt="Russian Twists">
            <h3>Russian Twists</h3>
            <button onclick="location.href='russiantwists.html'">View Tutorial</button>
        </div>

    </div>
</div>

</body>
</html>
