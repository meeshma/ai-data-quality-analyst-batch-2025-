<!DOCTYPE html>

<head>

<title>Update Metrics | FitForge</title>
<link rel="stylesheet" href="global.css">

<style>

header { background:white; padding:15px 40px; border-bottom:1px solid #e7e7e7; }

}
.btn {
    background:#ff5722; padding:12px; text-align:center; display:block;
    color:white; border-radius:6px; font-weight:bold; text-decoration:none;

<div class="logo">FitForge</div>
