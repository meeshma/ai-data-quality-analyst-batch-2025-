<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitForge | Tutorials</title>
<link rel="stylesheet" href="global.css">


    <style>
        body { margin:0; font-family:'Segoe UI', sans-serif; background:#f5f7fa; }
        
        header { 
            background:#fff; padding:15px 40px; display:flex; 
            justify-content:space-between; border-bottom:1px solid #ddd; 
        }

        nav a { margin:0 15px; color:#444; text-decoration:none; font-weight:500; }
        nav a:hover { color:#ff5722; }

        .logo { font-size:1.6rem; font-weight:bold; color:#ff5722; }

        .container { padding:40px; max-width:1200px; margin:auto; }

        .tutorial-grid {
            display:grid;
            grid-template-columns:repeat(3, 1fr);
            gap:30px;
        }

        @media(max-width:900px){
            .tutorial-grid { grid-template-columns:repeat(2, 1fr); }
        }

        @media(max-width:600px){
            .tutorial-grid { grid-template-columns:1fr; }
        }

        .tutorial-card {
            background:white; padding:20px;
            border-radius:12px;
            box-shadow:0 3px 10px rgba(0,0,0,0.08);
            transition:0.15s;
            text-align:center;
        }

        .tutorial-card:hover {
            transform:translateY(-4px);
            box-shadow:0 6px 14px rgba(0,0,0,0.12);
        }

        .tutorial-card img {
            width:100%;
            height:200px;
            object-fit:cover;
            border-radius:10px;
            cursor:pointer;
            transition:0.2s;
        }

        .tutorial-card img:hover { opacity:0.85; }

        .tutorial-card h3 { margin:15px 0 10px; font-size:1.2rem; }

        .tutorial-card button {
            margin-top:10px;
            padding:10px 18px;
            background:#ff5722;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:0.95rem;
            font-weight:600;
        }

        .tutorial-card button:hover {
            background:#e64a19;
        }
    </style>
</head>

<body>

<header>
    <div class="logo">FitForge</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
        <a href="signup.html">Sign up</a>
    </nav>
</header>

<div class="container">
    <h2>Tutorials</h2>

    <div class="tutorial-grid">

        <!-- Chest -->
        <div class="tutorial-card">
            <img src="https://www.trainheroic.com/wp-content/uploads/2023/07/23076-TH-Blog-2400px-jpg.webp">
            <h3>Chest Exercises</h3>
            <button onclick="location.href='chestexercises.html'">View Tutorial</button>
        </div>

        <!-- Back -->
        <div class="tutorial-card">
            <img src="https://xxlnutrition.com/_next/image?url=https%3A%2F%2Fxxlnutrition.com%2Fapi%2Fasset%2Ffileserver%2Fblog_article%2Ffile%2Fget%2F95441%2Fheader-image%2F0%2Fback-training%3Fch%3D2d51fe396a40964faf558f1c5d9e2246b129c0bd3653a9c88be347bd582abbc8%26t%3D1726121068&w=640&q=100">
            <h3>Back Exercises</h3>
            <button onclick="location.href='backexercises.html'">View Tutorial</button>
        </div>

        <!-- Legs -->
        <div class="tutorial-card">
            <img src="https://i0.wp.com/www.muscleandfitness.com/wp-content/uploads/2019/02/1109-Barbell-Back-Squat-John-Gaines.jpg?quality=86&strip=all">
            <h3>Leg Exercises</h3>
            <button onclick="location.href='legsexercises.html'">View Tutorial</button>
        </div>

        <!-- Shoulders -->
        <div class="tutorial-card">
            <img src="https://i0.wp.com/www.muscleandfitness.com/wp-content/uploads/2020/02/Lateral-Raises-GettyImages-728910037.jpg?quality=86&strip=all">
            <h3>Shoulder Exercises</h3>
            <button onclick="location.href='shoulderexercises.html'">View Tutorial</button>
        </div>

        <!-- Arms -->
        <div class="tutorial-card">
            <img src="https://hips.hearstapps.com/hmg-prod/images/gym-workout-weight-training-bodybuilding-muscular-royalty-free-image-1703160802.jpg?crop=1.00xw:1.00xh;0,0">
            <h3>Arm Exercises</h3>
            <button onclick="location.href='armsexercises.html'">View Tutorial</button>
        </div>

        <!-- Abs -->
        <div class="tutorial-card">
            <img src="https://i0.wp.com/www.muscleandfitness.com/wp-content/uploads/2017/07/1109-ryan-terry-weighted-crunch-abs.jpg?quality=86&strip=all">
            <h3>Abs Exercises</h3>
            <button onclick="location.href='absexercises.html'">View Tutorial</button>
        </div>

    </div>

</div>

</body>
</html>
