<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Payment | Venzo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Montserrat', sans-serif;
    }

    body {
      background: #0d0d0d;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .payment-box {
      width: 450px;
      padding: 30px;
      background: #1a1a1a;
      border-radius: 15px;
      box-shadow: 0 12px 35px rgba(255,0,120,0.3);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #ff3cac;
    }

    p {
      font-size: 16px;
      margin: 10px 0;
      color: #fff;
    }

    .total {
      font-size: 22px;
      font-weight: bold;
      margin-top: 20px;
      color: #ff3cac;
      text-align: center;
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 25px;
      font-size: 18px;
      background: linear-gradient(45deg, #ff007a, #ff3cac);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      opacity: 0.9;
    }

    /* 🔹 Modal styling */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      justify-content: center;
      align-items: center;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .modal.show {
      display: flex;
      opacity: 1;
    }

    .modal-box {
      background: #1a1a1a;
      padding: 25px;
      width: 300px;
      border-radius: 12px;
      text-align: center;
      transform: translateY(-50px);
      transition: transform 0.3s ease;
      color: white;
    }

    .modal.show .modal-box {
      transform: translateY(0);
    }

    .method-btn {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      background: linear-gradient(45deg, #ff007a, #ff3cac);
      color: white;
      font-weight: bold;
      transition: 0.3s;
    }

    .method-btn:hover {
      opacity: 0.9;
    }

    .cancel-btn {
      background: #333;
      color: #fff;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #333;
      background: #0d0d0d;
      color: white;
      outline: none;
    }

    input::placeholder {
      color: #aaa;
    }
  </style>
</head>

<body>

<div class="payment-box">
  <h2>Payment Summary</h2>

  <p><strong>Event:</strong> <span id="eventName"></span></p>
  <p><strong>Date:</strong> <span id="eventDate"></span></p>
  <p><strong>Number of Persons:</strong> <span id="numPersons"></span></p>
  <p><strong>Price per Person:</strong> ₹1119</p>

  <p class="total">Total Amount: ₹<span id="totalAmount"></span></p>

  <button onclick="payNow()">Pay Now</button>
</div>

<!-- 🔹 Card Payment Modal -->
<div class="modal" id="cardModal">
  <div class="modal-box">
    <h3>Card Payment</h3>

    <input type="text" placeholder="Card Number" required>
    <input type="text" placeholder="Expiry MM/YY" required>
    <input type="password" placeholder="CVV" required>

    <button class="method-btn" onclick="processCardPayment()">Pay</button>
    <button class="method-btn cancel-btn" onclick="closeCard()">Cancel</button>
  </div>
</div>

<!-- 🔹 Payment Method Modal -->
<div class="modal" id="paymentModal">
  <div class="modal-box">
    <h3>Select Payment Method</h3>

    <button class="method-btn" onclick="completePayment('UPI')">
      UPI (GPay / PhonePe)
    </button>

    <button class="method-btn" onclick="completePayment('Card')">
      Debit / Credit Card
    </button>

    <button class="method-btn cancel-btn" onclick="closeModalById('paymentModal')">
      Cancel
    </button>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);

  const eventName = params.get("name") || "Not Available";
  const eventDate = params.get("date") || "Not Available";
  const persons = params.get("persons") || "1";
  const total = params.get("total") || "1119";

  document.getElementById("eventName").textContent = eventName;
  document.getElementById("eventDate").textContent = eventDate;
  document.getElementById("numPersons").textContent = persons;
  document.getElementById("totalAmount").textContent = total;

  function openModal(id) {
    document.getElementById(id).classList.add("show");
  }

  function closeModalById(id) {
    document.getElementById(id).classList.remove("show");
  }

  function payNow() {
    openModal("paymentModal");
  }

  function closeCard() {
    closeModalById("cardModal");
  }

  function completePayment(method) {
    closeModalById("paymentModal");
    if (method === "UPI") {
      redirectToUPI();
    }
    if (method === "Card") {
      openModal("cardModal");
    }
  }

  function redirectToUPI() {
    const amount = document.getElementById("totalAmount").textContent;
    const upiId = "yourupiid@bank"; // Replace with your UPI ID
    const payeeName = "VenzoEvent";

    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    if (isMobile) {
      const upiLink = `upi://pay?pa=${upiId}&pn=${payeeName}&am=${amount}&cu=INR`;
      alert("Redirecting to UPI App...");
      setTimeout(() => window.location.href = upiLink, 500);
    } else {
      const gpayWebLink = `https://pay.google.com/upi/pay?pa=${upiId}&pn=${payeeName}&am=${amount}&cu=INR`;
      alert("You are on desktop. Redirecting to web UPI payment...");
      setTimeout(() => window.open(gpayWebLink, "_blank"), 500);
    }
  }

  function processCardPayment() {
    const cardNumber = document.querySelector('#cardModal input[placeholder="Card Number"]').value.trim();
    const expiry = document.querySelector('#cardModal input[placeholder="Expiry MM/YY"]').value.trim();
    const cvv = document.querySelector('#cardModal input[placeholder="CVV"]').value.trim();

    if (!cardNumber || !expiry || !cvv) {
      alert("Please fill all fields!");
      return;
    }

    if (!/^\d{16}$/.test(cardNumber)) {
      alert("Card number must be 16 digits.");
      return;
    }

    if (!/^\d{3,4}$/.test(cvv)) {
      alert("CVV must be 3 or 4 digits.");
      return;
    }

    closeCard();
    alert("Processing Card Payment...");
    setTimeout(() => {
      window.location.href = "success.html" + window.location.search;
    }, 2000);
  }

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
      closeModalById("paymentModal");
      closeModalById("cardModal");
    }
  });
</script>

</body>
</html>
