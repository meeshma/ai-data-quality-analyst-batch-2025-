<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Venzo</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Oswald', sans-serif;
    color: #fff;
}

.login-box {
    background: #111;
    padding: 40px;
    width: 360px;
    border-radius: 14px;
    text-align: center;
    box-shadow: 0 10px 35px rgba(0,0,0,0.6);
}

.login-box h2 {
    margin-bottom: 10px;
    letter-spacing: 2px;
}

.login-box p {
    font-size: 0.9rem;
    opacity: 0.7;
    margin-bottom: 25px;
}

.login-box input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-radius: 6px;
    outline: none;
}

.login-box button {
    width: 100%;
    padding: 12px;
    margin-top: 18px;
    background: #fff;
    color: #000;
    border: none;
    border-radius: 6px;
    font-size: 1rem;
    cursor: pointer;
}

.login-box button:hover {
    background: #e6e6e6;
}

.signup-link {
    margin-top: 15px;
    font-size: 0.85rem;
}

.signup-link a {
    color: #fff;
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>Log in or Sign up now</h2>
    <p>Book events and never miss the moment</p>

    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password">

    <button>Continue</button>

    <div class="signup-link">
        New to Venzo? <a href="#">Create an account</a>
    </div>
</div>

</body>
</html>
